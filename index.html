// Deduplicate
const seen = new Set();
const data = restaurants.filter(r => {
  const key = r.n + r.r;
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
});

let activeRegion = 'all';
let searchQ = '';
let markers = [];
let map, infoWindow, clusterer;

const DARK_STYLE = [
  {elementType:'geometry', stylers:[{color:'#0d1b2a'}]},
  {elementType:'labels.text.stroke', stylers:[{color:'#0d1b2a'}]},
  {elementType:'labels.text.fill', stylers:[{color:'#8899aa'}]},
  {featureType:'administrative', elementType:'geometry', stylers:[{color:'#1a2a4a'}]},
  {featureType:'administrative.country', elementType:'labels.text.fill', stylers:[{color:'#9aa5b1'}]},
  {featureType:'administrative.land_parcel', stylers:[{visibility:'off'}]},
  {featureType:'administrative.locality', elementType:'labels.text.fill', stylers:[{color:'#bfcbd9'}]},
  {featureType:'poi', stylers:[{visibility:'off'}]},
  {featureType:'road', elementType:'geometry', stylers:[{color:'#1a2a4a'}]},
  {featureType:'road', elementType:'geometry.stroke', stylers:[{color:'#0f3460'}]},
  {featureType:'road', elementType:'labels.text.fill', stylers:[{color:'#677d8e'}]},
  {featureType:'road.highway', elementType:'geometry', stylers:[{color:'#0f3460'}]},
  {featureType:'road.highway', elementType:'geometry.stroke', stylers:[{color:'#1a3a6c'}]},
  {featureType:'road.highway', elementType:'labels.text.fill', stylers:[{color:'#aab7c4'}]},
  {featureType:'transit', stylers:[{visibility:'off'}]},
  {featureType:'water', elementType:'geometry', stylers:[{color:'#0a1628'}]},
  {featureType:'water', elementType:'labels.text.fill', stylers:[{color:'#4e6d8c'}]},
];

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: {lat: 37.8, lng: -122.25},
    zoom: 9,
    styles: DARK_STYLE,
    mapTypeControl: true,
    mapTypeControlOptions: { style: google.maps.MapTypeControlStyle.HORIZONTAL_BAR, position: google.maps.ControlPosition.TOP_RIGHT },
    streetViewControl: false,
    fullscreenControl: true,
    zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_BOTTOM },
    fullscreenControlOptions: { position: google.maps.ControlPosition.RIGHT_BOTTOM },
  });
  infoWindow = new google.maps.InfoWindow({ maxWidth: 260 });
  const clusterRenderer = {
    render({ count, position }) {
      return new google.maps.Marker({
        position,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          fillColor: '#c0392b',
          fillOpacity: 0.9,
          strokeColor: '#fff',
          strokeWeight: 2,
          scale: Math.min(12 + count / 8, 28),
        },
        label: { text: String(count), color: '#fff', fontSize: '11px', fontWeight: 'bold' },
        zIndex: 1000,
      });
    }
  };
  clusterer = new markerClusterer.MarkerClusterer({ map, markers: [], renderer: clusterRenderer });
  document.getElementById('total-badge').textContent = `${data.length} restaurants`;
  render();
}

function markerIcon(color) {
  return {
    path: google.maps.SymbolPath.CIRCLE,
    fillColor: color,
    fillOpacity: 1,
    strokeColor: '#ffffff',
    strokeWeight: 1.5,
    scale: 6,
  };
}

function popupContent(r) {
  return `<div style="background:#1a2a4a;color:#eee;padding:14px;min-width:210px;font-family:'Segoe UI',sans-serif">
    <div style="font-weight:700;font-size:1rem;color:#fff;margin-bottom:4px">${r.n}</div>
    <div style="font-size:0.75rem;color:#aaa;margin-bottom:${r.c?'4px':'8px'}">${REGION_NAMES[r.r]||r.r}${r.closed?' &nbsp;·&nbsp; <span style="color:#e74c3c">Closed</span>':''}</div>
    ${r.c?`<div style="font-size:0.8rem;color:#ddd;margin-bottom:8px">${r.c}</div>`:''}
    <div style="display:flex;flex-direction:column;gap:6px">
      <a href="${r.url}" target="_blank" style="display:block;background:#c0392b;color:#fff;padding:5px 12px;border-radius:12px;font-size:0.75rem;text-decoration:none;text-align:center">Watch on KQED ↗</a>
      <a href="https://www.google.com/search?q=${encodeURIComponent(r.n)}" target="_blank" style="display:block;background:#4285F4;color:#fff;padding:5px 12px;border-radius:12px;font-size:0.75rem;text-decoration:none;text-align:center">Open in Google Maps ↗</a>
      <a href="https://www.yelp.com/search?find_desc=${encodeURIComponent(r.n)}&find_loc=${encodeURIComponent(REGION_CITIES[r.r]||'Bay Area, CA')}" target="_blank" style="display:block;background:#d32323;color:#fff;padding:5px 12px;border-radius:12px;font-size:0.75rem;text-decoration:none;text-align:center">Open in Yelp ↗</a>
    </div>
  </div>`;
}

function filtered() {
  return data.filter(r => {
    const matchRegion = activeRegion === 'all' || (activeRegion === 'CLOSED' ? r.closed : r.r === activeRegion && !r.closed);
    const matchSearch = !searchQ || r.n.toLowerCase().includes(searchQ) || (r.c||'').toLowerCase().includes(searchQ);
    return matchRegion && matchSearch;
  });
}

function buildMarkers() {
  clusterer.clearMarkers();
  markers = [];
  const vis = filtered();
  const newMarkers = vis.map(r => {
    const color = r.closed ? '#7f8c8d' : (REGION_COLORS[r.r] || '#aaa');
    const marker = new google.maps.Marker({
      position: { lat: r.lat, lng: r.lng },
      icon: markerIcon(color),
      title: r.n,
      optimized: true,
    });
    marker.addListener('click', () => {
      infoWindow.setContent(popupContent(r));
      infoWindow.open({ anchor: marker, map });
      selectItem(r.n, false);
    });
    markers.push({ r, m: marker });
    return marker;
  });
  clusterer.addMarkers(newMarkers);
}

function buildList() {
  const list = document.getElementById('list');
  const vis = filtered();
  document.getElementById('count-label').textContent = `Showing ${vis.length} of ${data.length} restaurants`;
  if (!vis.length) { list.innerHTML = '<div class="no-results">No restaurants found.</div>'; return; }

  const groups = {};
  vis.forEach(r => { if (!groups[r.r]) groups[r.r] = []; groups[r.r].push(r); });
  const order = ['SF','EB','NB','SB','MB'];
  let html = '';
  order.forEach(reg => {
    if (!groups[reg]) return;
    html += `<div class="region-group"><h3>${REGION_NAMES[reg]}</h3>`;
    groups[reg].sort((a,b) => a.n.localeCompare(b.n)).forEach(r => {
      const color = r.closed ? '#7f8c8d' : (REGION_COLORS[r.r] || '#aaa');
      html += `<div class="rest-item${r.closed?' closed':''}" data-name="${r.n.replace(/"/g,'&quot;')}">
        <div class="rest-dot" style="background:${color}"></div>
        <div class="rest-info">
          <div class="rest-name">${r.n}</div>
          <div class="rest-meta">${r.c||''} ${r.closed?'· Closed':''}</div>
        </div>
        <a class="rest-link" href="${r.url}" target="_blank">KQED&nbsp;↗</a>
      </div>`;
    });
    html += '</div>';
  });
  list.innerHTML = html;
  list.querySelectorAll('.rest-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.tagName === 'A') return;
      selectItem(el.dataset.name, true);
    });
  });
}

function selectItem(name, panMap) {
  document.querySelectorAll('.rest-item').forEach(el => el.classList.toggle('active', el.dataset.name === name));
  const el = document.querySelector(`.rest-item[data-name="${CSS.escape(name)}"]`);
  if (el) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
  const entry = markers.find(m => m.r.n === name);
  if (entry) {
    if (panMap) {
      map.panTo(entry.m.getPosition());
      if (map.getZoom() < 13) map.setZoom(13);
    }
    infoWindow.setContent(popupContent(entry.r));
    infoWindow.open({ anchor: entry.m, map });
  }
}

function render() { buildMarkers(); buildList(); }

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeRegion = btn.dataset.region;
    infoWindow.close();
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase().trim();
  infoWindow.close();
  render();
});
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAncwCw8PsQRDwT45H_jFH3dizXTpZdO-0&callback=initMap&loading=async" async defer></script>
