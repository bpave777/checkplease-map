  .filter-btn[data-region="EB"].active { background: #27ae60; }

  .rest-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .rest-info { flex: 1; min-width: 0; }
  .rest-name { font-size: 0.85rem; font-weight: 600; color: #e8e8e8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rest-item.closed .rest-name { color: #888; text-decoration: line-through; }
  .rest-meta { font-size: 0.72rem; color: #888; margin-top: 1px; }
  .rest-link { font-size: 0.7rem; color: #e74c3c; text-decoration: none; margin-left: auto; flex-shrink: 0; padding-top: 3px; }
  .rest-link:hover { text-decoration: underline; }
  #map { flex: 1; }

  .leaflet-popup-tip { background: #1a2a4a; }
  .popup-name { font-weight: 700; font-size: 1rem; color: #fff; margin-bottom: 4px; }
  .popup-region { font-size: 0.75rem; color: #aaa; margin-bottom: 6px; }

// Deduplicate
const seen = new Set();
const data = restaurants.filter(r => {
  const key = r.n + r.r;
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
});

let activeRegion = 'all';
let searchQ = '';
let activeMarker = null;
let markers = [];

const map = L.map('map').setView([37.8, -122.25], 9);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19
}).addTo(map);

function colorForRegion(r) { return REGION_COLORS[r] || '#aaa'; }

function makeIcon(color, small) {
  const s = small ? 10 : 14;
  return L.divIcon({
    className:'',
    html:`<div style="width:${s}px;height:${s}px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.6)"></div>`,
    iconSize:[s,s], iconAnchor:[s/2,s/2]
  });
}

function filtered() {
  return data.filter(r => {
    const matchRegion = activeRegion === 'all' || (activeRegion === 'CLOSED' ? r.closed : r.r === activeRegion && !r.closed);
    const matchSearch = !searchQ || r.n.toLowerCase().includes(searchQ) || (r.c||'').toLowerCase().includes(searchQ);
    return matchRegion && matchSearch;
  });
}

function buildMarkers() {
  markers.forEach(m => map.removeLayer(m.m));
  markers = [];
  const vis = filtered();
  vis.forEach((r, i) => {
    const color = colorForRegion(r.r);
    const m = L.marker([r.lat, r.lng], { icon: makeIcon(r.closed ? '#7f8c8d' : color, true) }).addTo(map);
    m.bindPopup(`
      <div class="popup-name">${r.n}</div>
      <div class="popup-region">${REGION_NAMES[r.r]||r.r}${r.closed ? ' &nbsp;·&nbsp; <span style="color:#e74c3c">Closed</span>':''}</div>
      <div class="popup-cuisine">${r.c||''}</div>
      <a class="popup-link" href="${r.url}" target="_blank">Watch on KQED ↗</a>
    `);
    m.on('click', () => selectItem(r.n, false));
    markers.push({ r, m });
  });
}

function buildList() {
  const list = document.getElementById('list');
  const vis = filtered();
  document.getElementById('count-label').textContent = `Showing ${vis.length} of ${data.length} restaurants`;
  if (!vis.length) { list.innerHTML = '<div class="no-results">No restaurants found.</div>'; return; }

  // Group by region
  const groups = {};
  vis.forEach(r => {
    if (!groups[r.r]) groups[r.r] = [];
    groups[r.r].push(r);
  });
  const order = ['SF','EB','NB','SB','MB'];
  let html = '';
  order.forEach(reg => {
    if (!groups[reg]) return;
    html += `<div class="region-group"><h3>${REGION_NAMES[reg]}</h3>`;
    groups[reg].sort((a,b) => a.n.localeCompare(b.n)).forEach(r => {
      const color = colorForRegion(r.r);
      html += `<div class="rest-item${r.closed?' closed':''}" data-name="${r.n.replace(/"/g,'&quot;')}">
        <div class="rest-dot" style="background:${r.closed?'#7f8c8d':color}"></div>
        <div class="rest-info">
          <div class="rest-name">${r.n}</div>
          <div class="rest-meta">${r.c||''}${r.closed?' · Closed':''}</div>
        </div>
        <a class="rest-link" href="${r.url}" target="_blank">KQED&nbsp;↗</a>
      </div>`;
    });
    html += '</div>';
  });
  list.innerHTML = html;
  list.querySelectorAll('.rest-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.tagName === 'A') return;
      selectItem(el.dataset.name, true);
    });
  });
}

function selectItem(name, panMap) {
  // highlight list
  document.querySelectorAll('.rest-item').forEach(el => el.classList.toggle('active', el.dataset.name === name));
  // scroll to item
  const el = document.querySelector(`.rest-item[data-name="${CSS.escape(name)}"]`);
  if (el) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
  // open popup
  const entry = markers.find(m => m.r.n === name);
  if (entry) {
    if (panMap) map.setView([entry.r.lat, entry.r.lng], Math.max(map.getZoom(), 13), { animate: true });
    entry.m.openPopup();
  }
}

function render() { buildMarkers(); buildList(); }

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeRegion = btn.dataset.region;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase().trim();
  render();
});

document.getElementById('total-badge').textContent = `${data.length} restaurants`;
render();
</script>
